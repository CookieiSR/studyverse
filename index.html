<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: #07080d; color: #e8eaf0; font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: #07080d; }
  ::-webkit-scrollbar-thumb { background: #2a2d3a; border-radius: 3px; }
  @keyframes fadeInDown { from{opacity:0;transform:translateY(-12px);}to{opacity:1;transform:translateY(0);} }
  @keyframes slideUp    { from{opacity:0;transform:translateY(40px);}to{opacity:1;transform:translateY(0);} }
  @keyframes fadeIn     { from{opacity:0;}to{opacity:1;} }
  @keyframes gradMove   { 0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;} }
  @keyframes pulse      { 0%,100%{transform:scale(1);}50%{transform:scale(1.05);} }
  .anim-a { animation: fadeInDown .7s ease both; }
  .anim-b { animation: slideUp .8s ease .1s both; }
  .anim-c { animation: slideUp .8s ease .25s both; }
  .anim-d { animation: slideUp .8s ease .4s both; }
  .cat-card { transition: transform .28s ease, box-shadow .28s ease !important; }
  .cat-card:hover { transform: translateY(-7px) scale(1.02) !important; }
  .cat-card:hover .glow { opacity: 1 !important; }
  .btn-p {
    display:inline-flex;align-items:center;justify-content:center;
    padding:.85rem 2rem;border-radius:10px;border:none;cursor:pointer;
    font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:700;color:#fff;
    background:linear-gradient(135deg,#818cf8,#38bdf8,#34d399);
    background-size:200% 200%;animation:gradMove 4s ease infinite;
    box-shadow:0 0 28px rgba(129,140,248,.4);transition:opacity .2s,transform .2s;
  }
  .btn-p:hover{opacity:.88;transform:scale(1.03);}
  .btn-g {
    display:inline-flex;align-items:center;justify-content:center;
    padding:.8rem 2rem;border-radius:10px;cursor:pointer;
    font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:600;color:#e8eaf0;

/* Stars */
function initStars(){
  const c=document.getElementById("sc"); if(!c)return;
  const ctx=c.getContext("2d");
  const resize=()=>{c.width=window.innerWidth;c.height=window.innerHeight;};
  resize(); window.addEventListener("resize",resize);
  const stars=Array.from({length:200},()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.3+.2,a:Math.random()*.6+.1,da:(Math.random()-.5)*.015}));
  let id;
  const draw=()=>{
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s=>{ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${s.a})`;ctx.fill();s.a+=s.da;if(s.a>.9||s.a<.05)s.da*=-1;});
    id=requestAnimationFrame(draw);
  };
  draw(); return()=>cancelAnimationFrame(id);
}

        </div>
      </div>
      <div style={{height:"6px",background:"rgba(255,255,255,.08)",borderRadius:"100px",overflow:"hidden"}}>
        <div style={{height:"100%",width:`${Math.min(100,(started/CATS.length)*100)}%`,background:"linear-gradient(90deg,#818cf8,#38bdf8,#34d399)",borderRadius:"100px",transition:"width 1s ease"}}/>
      </div>
    </div>
    <h3 style={{fontFamily:"'Syne',sans-serif",fontSize:"1.1rem",fontWeight:800,marginBottom:"1.1rem"}}>All Subjects</h3>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(255px,1fr))",gap:"1.1rem"}}>
      {CATS.map(cat=><CatCard key={cat.id} cat={cat} pts={progress[cat.id]||0} onClick={()=>goStudy(cat)}/>)}
    </div>
  </div>;
}

function Study({cat,go,startQuiz}){
  if(!cat)return null;
  return<div className="page" style={{minHeight:"100vh",padding:"5.5rem 1.5rem 3rem",maxWidth:"860px",margin:"0 auto"}}>
    <button onClick={()=>go("dashboard")} style={{background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",borderRadius:"8px",color:"#8b8fa8",padding:".45rem .95rem",cursor:"pointer",marginBottom:"2rem",fontSize:".84rem",fontFamily:"'DM Sans',sans-serif"}}>← Back</button>
    <div style={{display:"flex",alignItems:"center",gap:"1.1rem",marginBottom:"1.8rem"}}>
      <div style={{fontSize:"3.2rem"}}>{cat.icon}</div>
      <div>
        <div style={{fontSize:".72rem",color:cat.color,fontWeight:700,letterSpacing:".1em",textTransform:"uppercase"}}>{cat.parent}</div>
        <h2 style={{fontFamily:"'Syne',sans-serif",fontSize:"clamp(1.5rem,4vw,2.2rem)",fontWeight:800}}>{cat.name}</h2>
      </div>
    </div>
    <p style={{color:"#9da2b8",lineHeight:1.8,marginBottom:"2.5rem",fontSize:"1rem",maxWidth:"580px",borderLeft:`3px solid ${cat.color}`,paddingLeft:"1rem"}}>{cat.desc}</p>
    <h3 style={{fontFamily:"'Syne',sans-serif",fontSize:"1.05rem",fontWeight:800,marginBottom:"1rem"}}>Topics to Explore</h3>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(190px,1fr))",gap:".75rem",marginBottom:"2.5rem"}}>
      {cat.topics.map(t=><div key={t} style={{padding:".95rem 1rem",background:`${cat.color}12`,border:`1px solid ${cat.color}28`,borderRadius:"12px",fontSize:".88rem",fontWeight:500}}><span style={{color:cat.color,marginRight:".4rem"}}>→</span>{t}</div>)}
    </div>
    <button className="btn-p" onClick={startQuiz} style={{padding:"1rem 2.5rem",fontSize:"1rem",boxShadow:`0 0 30px ${cat.color}45`}}>🎯 &nbsp; Start Quiz</button>
  </div>;
}

function Quiz({cat,go,onComplete}){
  const[idx,setIdx]=useState(0);
  const[sel,setSel]=useState(null);
  const[ans,setAns]=useState(false);
  const[score,setScore]=useState(0);
  const[done,setDone]=useState(false);
  if(!cat)return null;
  const qs=QUIZ[cat.id]||[{q:`Sample for ${cat.id}`,opts:["A","B","C","D"],ans:0,exp:"Sample."}];
  const q=qs[idx];

  const pick=(i)=>{
    if(ans)return;
    setSel(i);setAns(true);
    if(i===q.ans)setScore(s=>s+1);
  };
  const next=()=>{
    if(idx+1>=qs.length){onComplete(cat.id,score);setDone(true);}
    else{setIdx(i=>i+1);setSel(null);setAns(false);}
  };

  if(done)return<div className="page" style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"2rem",textAlign:"center"}}>
    <div style={{fontSize:"4.5rem",marginBottom:"1rem",animation:"pulse 1.5s ease infinite"}}>{score===qs.length?"🏆":score>=qs.length/2?"⭐":"📚"}</div>
    <h2 style={{fontFamily:"'Syne',sans-serif",fontSize:"2rem",fontWeight:800,marginBottom:".5rem"}}>Quiz Complete!</h2>
    <p style={{color:"#8b8fa8",marginBottom:".4rem"}}>You scored <span style={{color:cat.color,fontWeight:700}}>{score}/{qs.length}</span> on {cat.name}</p>
    <p style={{color:"#34d399",fontWeight:600,marginBottom:"2rem",fontSize:".9rem"}}>+{score*10} XP earned!</p>
    <div style={{display:"flex",gap:"1rem",flexWrap:"wrap",justifyContent:"center"}}>
      <button className="btn-p" onClick={()=>{setIdx(0);setSel(null);setAns(false);setScore(0);setDone(false);}}>Try Again</button>
      <button className="btn-g" onClick={()=>go("dashboard")}>Dashboard</button>
    </div>
  </div>;

  return<div className="page" style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"5rem 1.5rem 2rem"}}>
    <div style={{width:"100%",maxWidth:"560px"}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:".78rem",color:"#8b8fa8",marginBottom:".4rem"}}>
        <span>{cat.icon} {cat.name}</span><span>Question {idx+1}/{qs.length}</span>
      </div>
      <div style={{height:"4px",background:"rgba(255,255,255,.08)",borderRadius:"100px",overflow:"hidden",marginBottom:"2rem"}}>
        <div style={{height:"100%",width:`${(idx/qs.length)*100}%`,background:cat.color,borderRadius:"100px",transition:"width .5s"}}/>
      </div>
      <div style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",borderRadius:"18px",padding:"1.8rem",marginBottom:"1.4rem"}}>
        <h3 style={{fontFamily:"'Syne',sans-serif",fontSize:"1.2rem",fontWeight:700,lineHeight:1.45}}>{q.q}</h3>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:".75rem",marginBottom:"1.4rem"}}>
        {q.opts.map((opt,i)=>{
          let bg="rgba(255,255,255,.04)",border="1px solid rgba(255,255,255,.1)",color="#e8eaf0";
          if(ans){
            if(i===q.ans){bg=`${cat.color}22`;border=`1px solid ${cat.color}`;color=cat.color;}
            else if(i===sel&&i!==q.ans){bg="rgba(248,113,113,.15)";border="1px solid #f87171";color="#f87171";}
          }
          return<button key={i} className="opt" disabled={ans} onClick={()=>pick(i)} style={{background:bg,border,color}}>
            <span style={{width:"24px",height:"24px",borderRadius:"50%",background:"rgba(255,255,255,.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:".72rem",fontWeight:700,flexShrink:0}}>{["A","B","C","D"][i]}</span>
            {opt}
          </button>;
        })}
      </div>
      {ans&&<div style={{animation:"fadeIn .4s ease"}}>
        <div style={{padding:"1rem",background:`${cat.color}12`,border:`1px solid ${cat.color}28`,borderRadius:"12px",fontSize:".84rem",color:"#c5c8d6",lineHeight:1.7,marginBottom:"1rem"}}>
          <span style={{color:cat.color,fontWeight:700}}>💡 Explanation: </span>{q.exp}
        </div>
        <button className="btn-p" style={{width:"100%",padding:".9rem",fontSize:".95rem"}} onClick={next}>
          {idx+1>=qs.length?"See Results →":"Next Question →"}
        </button>
      </div>}
    </div>
  </div>;
}

function App(){
  const[page,setPage]=useState("home");
  const[user,setUser]=useState(null);
  const[cat,setCat]=useState(null);
  const[progress,setProgress]=useState({});
  const[notif,setNotif]=useState(null);

  useEffect(()=>initStars(),[]);

  const go=(p)=>{window.scrollTo({top:0,behavior:"smooth"});setPage(p);};
  const showN=(m,c="#34d399")=>{setNotif({m,c});setTimeout(()=>setNotif(null),2600);};

  const handleAuth=(form,mode)=>{
    if(!form.email){showN("Please enter your email","#f87171");return;}
    setUser({name:form.name||"Learner",email:form.email});
    go("dashboard");
    showN(mode==="signup"?"Welcome to StudyVerse! 🎉":"Welcome back! 👋");
  };
  const signOut=()=>{setUser(null);setProgress({});setCat(null);go("home");showN("Signed out","#818cf8");};
  const onComplete=(catId,s)=>{setProgress(p=>({...p,[catId]:(p[catId]||0)+1}));};
  const xp=Object.values(progress).reduce((a,b)=>a+b,0)*10;

  return<>
    <Notif n={notif}/>
    <Nav user={user} go={go} signOut={signOut} xp={xp}/>
    {page==="home"&&<Home go={go}/>}
    {page==="auth"&&<Auth onAuth={handleAuth}/>}
    {page==="dashboard"&&user&&<Dashboard user={user} progress={progress} goStudy={c=>{setCat(c);go("study");}}/>}
    {page==="study"&&user&&<Study cat={cat} go={go} startQuiz={()=>go("quiz")}/>}
    {page==="quiz"&&user&&<Quiz cat={cat} go={go} onComplete={onComplete}/>}
  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
