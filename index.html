/* ── STARS ── */
function initStars(){
  const c=document.getElementById("sc");if(!c)return;
  const ctx=c.getContext("2d");
  const r=()=>{c.width=window.innerWidth;c.height=window.innerHeight;};
  r();window.addEventListener("resize",r);
  const s=Array.from({length:200},()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.3+.2,a:Math.random()*.6+.1,da:(Math.random()-.5)*.015}));
  let id;
  const d=()=>{ctx.clearRect(0,0,c.width,c.height);s.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${p.a})`;ctx.fill();p.a+=p.da;if(p.a>.9||p.a<.05)p.da*=-1;});id=requestAnimationFrame(d);};
  d();return()=>cancelAnimationFrame(id);
}

function Notif({n}){if(!n)return null;return<div style={{position:"fixed",top:"72px",left:"50%",transform:"translateX(-50%)",zIndex:999,background:`${n.c}18`,border:`1px solid ${n.c}55`,color:n.c,padding:".6rem 1.4rem",borderRadius:"10px",fontSize:".87rem",fontWeight:600,backdropFilter:"blur(12px)",animation:"fadeInDown .3s ease",whiteSpace:"nowrap"}}>{n.m}</div>;}

function Nav({user,go,signOut,xp}){return<nav style={{position:"fixed",top:0,left:0,right:0,zIndex:100,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 1.8rem",height:"62px",background:"rgba(7,8,13,.9)",backdropFilter:"blur(20px)",borderBottom:"1px solid rgba(255,255,255,.06)"}}>
  <div onClick={()=>go(user?"dashboard":"home")} style={{fontFamily:"'Syne',sans-serif",fontSize:"1.35rem",fontWeight:800,letterSpacing:"-.03em",cursor:"pointer",background:"linear-gradient(135deg,#818cf8,#38bdf8)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>StudyVerse ✦</div>

    {!user?<>
      <button className="btn-g" onClick={()=>go("auth")} style={{padding:".45rem 1.1rem",fontSize:".84rem"}}>Sign In</button>

      <button className="btn-g" onClick={signOut} style={{padding:".4rem 1rem",fontSize:".8rem",color:"#f87171",borderColor:"#f8717145"}}>Sign Out</button>
    </>}
  </div>
</nav>;}

function Card({cat,pts,onClick}){return<div className="cc" onClick={onClick} style={{position:"relative",background:cat.bg,border:`1px solid ${cat.color}28`,borderRadius:"16px",padding:"1.5rem",cursor:"pointer",boxShadow:"0 4px 22px rgba(0,0,0,.45)"}}>
  <div className="glow" style={{position:"absolute",inset:0,borderRadius:"16px",background:`radial-gradient(circle at 30% 30%,${cat.color}18,transparent 70%)`,opacity:0,transition:"opacity .3s"}}/>
  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:".65rem"}}>
    <span style={{fontSize:"1.8rem"}}>{cat.icon}</span>
    {pts>0&&<span style={{fontSize:".7rem",fontWeight:700,color:cat.color,background:`${cat.color}18`,padding:".2rem .6rem",borderRadius:"100px",border:`1px solid ${cat.color}35`}}>{pts} XP</span>}
  </div>
  <div style={{fontSize:".67rem",color:cat.color,fontWeight:700,letterSpacing:".1em",marginBottom:".2rem",textTransform:"uppercase"}}>{cat.parent}</div>
  <h3 style={{fontFamily:"'Syne',sans-serif",fontSize:"1.15rem",fontWeight:800,marginBottom:".4rem"}}>{cat.name}</h3>
  <p style={{fontSize:".78rem",color:"#7a7f95",lineHeight:1.6,marginBottom:pts>0?".75rem":"0"}}>{cat.desc.slice(0,65)}…</p>
  {pts>0&&<div style={{height:"4px",background:"rgba(255,255,255,.08)",borderRadius:"100px",overflow:"hidden"}}>
    <div style={{height:"100%",width:`${Math.min(100,(pts/200)*100)}%`,background:cat.color,borderRadius:"100px"}}/>
  </div>}
</div>;}

function Home({go}){return<div className="page">
  <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",textAlign:"center",padding:"7rem 1.5rem 3rem"}}>
    <div className="anim-a" style={{display:"inline-flex",alignItems:"center",gap:".5rem",background:"rgba(129,140,248,.1)",border:"1px solid rgba(129,140,248,.3)",borderRadius:"100px",padding:".38rem 1rem",marginBottom:"2rem",fontSize:".74rem",color:"#818cf8",fontWeight:700,letterSpacing:".1em"}}>✦ &nbsp; KNOWLEDGE FOR THE NEW GENERATION</div>
    <h1 className="anim-b" style={{fontFamily:"'Syne',sans-serif",fontSize:"clamp(2.8rem,8vw,6.5rem)",fontWeight:800,lineHeight:.93,letterSpacing:"-.04em",marginBottom:"1.4rem"}}>
      <span style={{color:"#e8eaf0"}}>Learn anything.</span><br/>
      <span style={{background:"linear-gradient(135deg,#818cf8 0%,#38bdf8 50%,#34d399 100%)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Master everything.</span>
    </h1>
    <p className="anim-c" style={{maxWidth:"520px",fontSize:"1.05rem",color:"#8b8fa8",lineHeight:1.75,marginBottom:"2.4rem"}}>14 subjects. 3 difficulty levels. Real questions. Real progress saved to your account.</p>
    <div className="anim-d" style={{display:"flex",gap:"1rem",flexWrap:"wrap",justifyContent:"center"}}>
      <button className="btn-p" onClick={()=>go("auth")}>Start Learning Free →</button>
      <button className="btn-g" onClick={()=>document.getElementById("cats")?.scrollIntoView({behavior:"smooth"})}>Browse 14 Subjects</button>
    </div>
    <div className="anim-d" style={{display:"flex",gap:"2.5rem",marginTop:"3.5rem",flexWrap:"wrap",justifyContent:"center"}}>
      {[["14","Subjects"],["500+","Questions"],["3","Difficulty Levels"],["Free","Forever"]].map(([n,l])=><div key={l} style={{textAlign:"center"}}>
        <div style={{fontFamily:"'Syne',sans-serif",fontSize:"1.8rem",fontWeight:800,background:"linear-gradient(135deg,#818cf8,#38bdf8)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{n}</div>
        <div style={{fontSize:".72rem",color:"#6b6f80",letterSpacing:".08em",marginTop:".2rem",textTransform:"uppercase"}}>{l}</div>
      </div>)}
    </div>
  </div>
  <div id="cats" style={{padding:"2rem 1.5rem 6rem",maxWidth:"1300px",margin:"0 auto"}}>
    <div style={{textAlign:"center",marginBottom:"2.5rem"}}>
      <h2 style={{fontFamily:"'Syne',sans-serif",fontSize:"clamp(1.7rem,4vw,2.6rem)",fontWeight:800,letterSpacing:"-.03em",marginBottom:".5rem"}}>Choose Your Path</h2>
      <p style={{color:"#8b8fa8"}}>14 worlds of knowledge — from the cosmos to the canvas</p>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:"1rem"}}>
      {CATS.map(cat=><Card key={cat.id} cat={cat} pts={0} onClick={()=>go("auth")}/>)}
    </div>
  </div>
</div>;}

/* ── AUTH with real Supabase ── */
function Auth({onAuth,showN}){
  const[mode,setMode]=useState("signup");
  const[form,setForm]=useState({name:"",email:"",password:""});
  const[loading,setLoading]=useState(false);
  const upd=(k,v)=>setForm(f=>({...f,[k]:v}));

  const submit=async()=>{
    if(!form.email||!form.password){showN("Please fill in all fields","#f87171");return;}
    setLoading(true);
    try{
      if(mode==="signup"){
        const{data,error}=await sb.auth.signUp({email:form.email,password:form.password,options:{data:{name:form.name||"Learner"}}});
        if(error)throw error;
        if(data.user){
          showN("Account created! Welcome 🎉","#34d399");
          onAuth({id:data.user.id,name:form.name||"Learner",email:form.email});
        }else{
          showN("Check your email to confirm your account!","#fbbf24");
        }
      }else{
        const{data,error}=await sb.auth.signInWithPassword({email:form.email,password:form.password});
        if(error)throw error;
        const name=data.user.user_metadata?.name||"Learner";
        showN(`Welcome back, ${name}! 👋`,"#34d399");
        onAuth({id:data.user.id,name,email:form.email});
      }
    }catch(e){
      showN(e.message||"Something went wrong","#f87171");
    }
    setLoading(false);
  };

  return<div className="page" style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:"5rem 1.5rem 2rem"}}>
    <div style={{width:"100%",maxWidth:"420px"}}>
      <div style={{textAlign:"center",marginBottom:"1.8rem"}}>
        <h2 style={{fontFamily:"'Syne',sans-serif",fontSize:"2rem",fontWeight:800,marginBottom:".4rem"}}>{mode==="signin"?"Welcome back":"Join StudyVerse"}</h2>
        <p style={{color:"#8b8fa8",fontSize:".9rem"}}>{mode==="signin"?"Your progress is saved to your account":"Create your free account — progress saves automatically"}</p>
      </div>
      <div style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",borderRadius:"20px",padding:"1.8rem",backdropFilter:"blur(20px)"}}>
        <div style={{display:"flex",background:"rgba(255,255,255,.05)",borderRadius:"10px",padding:"4px",marginBottom:"1.4rem"}}>
          {["signin","signup"].map(m=><button key={m} onClick={()=>setMode(m)} style={{flex:1,padding:".6rem",borderRadius:"7px",border:"none",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",background:mode===m?"rgba(129,140,248,.3)":"transparent",color:mode===m?"#818cf8":"#8b8fa8",fontWeight:600,fontSize:".85rem",transition:"all .2s"}}>{m==="signin"?"Sign In":"Sign Up"}</button>)}
        </div>
        {mode==="signup"&&<div style={{marginBottom:"1rem"}}>
          <label style={{fontSize:".74rem",color:"#8b8fa8",fontWeight:600,display:"block",marginBottom:".4rem"}}>NAME</label>
          <input value={form.name} onChange={e=>upd("name",e.target.value)} placeholder="Your name"/>
        </div>}
        <div style={{marginBottom:"1rem"}}>
          <label style={{fontSize:".74rem",color:"#8b8fa8",fontWeight:600,display:"block",marginBottom:".4rem"}}>EMAIL</label>
          <input type="email" value={form.email} onChange={e=>upd("email",e.target.value)} placeholder="you@email.com"/>
        </div>
        <div style={{marginBottom:"1.4rem"}}>
          <label style={{fontSize:".74rem",color:"#8b8fa8",fontWeight:600,display:"block",marginBottom:".4rem"}}>PASSWORD</label>
          <input type="password" value={form.password} onChange={e=>upd("password",e.target.value)} placeholder="••••••••" onKeyDown={e=>e.key==="Enter"&&submit()}/>
        </div>
        <button className="btn-p" style={{width:"100%",padding:".9rem",animation:"none",background:"linear-gradient(135deg,#818cf8,#38bdf8)",opacity:loading?.7:1}} onClick={submit} disabled={loading}>
          {loading?<span className="spinner"/>:mode==="signin"?"Sign In →":"Create Account →"}
        </button>
        <div style={{marginTop:"1rem",padding:"1rem",background:"rgba(129,140,248,.08)",border:"1px solid rgba(129,140,248,.2)",borderRadius:"10px",fontSize:".8rem",color:"#818cf8"}}>
          🔐 Your progress is saved to your real account — sign in from any device!
        </div>
      </div>
    </div>
  </div>;
}

function Dashboard({user,progress,goStudy,loading}){
  const xp=Object.values(progress).reduce((a,b)=>a+b,0);
  const started=Object.keys(progress).filter(k=>progress[k]>0).length;
  const level=Math.floor(xp/100)+1;
  return<div className="page" style={{minHeight:"100vh",padding:"5.5rem 1.5rem 4rem",maxWidth:"1300px",margin:"0 auto"}}>
    <div style={{marginBottom:"2rem"}}>
      <div style={{fontSize:".74rem",color:"#818cf8",fontWeight:700,letterSpacing:".1em",marginBottom:".3rem"}}>WELCOME BACK</div>
      <h2 style={{fontFamily:"'Syne',sans-serif",fontSize:"clamp(1.7rem,4vw,2.4rem)",fontWeight:800,letterSpacing:"-.03em"}}>{user.name} ✦</h2>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:"1rem",marginBottom:"1.5rem"}}>
      {[{l:"TOTAL XP",v:xp,c:"#818cf8"},{l:"LEVEL",v:`Lv. ${level}`,c:"#34d399"},{l:"SUBJECTS",v:`${started}/${CATS.length}`,c:"#38bdf8"}].map(s=><div key={s.l} style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.07)",borderRadius:"14px",padding:"1.1rem 1.3rem"}}>
        <div style={{fontSize:".67rem",color:"#8b8fa8",fontWeight:700,letterSpacing:".08em",marginBottom:".3rem"}}>{s.l}</div>
        <div style={{fontFamily:"'Syne',sans-serif",fontSize:"1.6rem",fontWeight:800,color:s.c}}>{loading?<span className="spinner"/>:s.v}</div>
      </div>)}
    </div>
    <div style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.07)",borderRadius:"14px",padding:"1rem 1.3rem",marginBottom:"2rem"}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:".76rem",color:"#8b8fa8",marginBottom:".5rem"}}>
        <span>Level {level}</span><span>{xp%100}/100 XP to Level {level+1}</span>
      </div>
      <div style={{height:"8px",background:"rgba(255,255,255,.08)",borderRadius:"100px",overflow:"hidden"}}>
        <div style={{height:"100%",width:`${xp%100}%`,background:"linear-gradient(90deg,#818cf8,#38bdf8,#34d399)",borderRadius:"100px",transition:"width 1s ease"}}/>
      </div>
    </div>
    <h3 style={{fontFamily:"'Syne',sans-serif",fontSize:"1.1rem",fontWeight:800,marginBottom:"1rem"}}>All Subjects</h3>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:"1rem"}}>
      {CATS.map(cat=><Card key={cat.id} cat={cat} pts={progress[cat.id]||0} onClick={()=>goStudy(cat)}/>)}
    </div>
  </div>;
}

function Study({cat,go,onXP}){
  const[diff,setDiff]=useState(null);
  if(!cat)return null;
  if(diff)return<Quiz cat={cat} diff={diff} go={go} onBack={()=>setDiff(null)} onXP={onXP}/>;
  return<div className="page" style={{minHeight:"100vh",padding:"5.5rem 1.5rem 3rem",maxWidth:"800px",margin:"0 auto"}}>
    <button onClick={()=>go("dashboard")} style={{background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",borderRadius:"8px",color:"#8b8fa8",padding:".45rem .95rem",cursor:"pointer",marginBottom:"2rem",fontSize:".84rem",fontFamily:"'DM Sans',sans-serif"}}>← Back</button>
    <div style={{display:"flex",alignItems:"center",gap:"1.1rem",marginBottom:"1.5rem"}}>
      <div style={{fontSize:"3rem"}}>{cat.icon}</div>
      <div>
        <div style={{fontSize:".72rem",color:cat.color,fontWeight:700,letterSpacing:".1em",textTransform:"uppercase"}}>{cat.parent}</div>
        <h2 style={{fontFamily:"'Syne',sans-serif",fontSize:"clamp(1.5rem,4vw,2.2rem)",fontWeight:800}}>{cat.name}</h2>
      </div>
    </div>
    <p style={{color:"#9da2b8",lineHeight:1.8,marginBottom:"2.5rem",borderLeft:`3px solid ${cat.color}`,paddingLeft:"1rem"}}>{cat.desc}</p>
    <h3 style={{fontFamily:"'Syne',sans-serif",fontSize:"1.1rem",fontWeight:800,marginBottom:"1rem"}}>Choose Difficulty</h3>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:"1rem"}}>
      {DIFF.map(d=><div key={d.key} className="cc" onClick={()=>setDiff(d.key)} style={{position:"relative",background:"rgba(255,255,255,.04)",border:`2px solid ${d.color}35`,borderRadius:"16px",padding:"1.5rem",cursor:"pointer",textAlign:"center"}}>
        <div className="glow" style={{position:"absolute",inset:0,borderRadius:"16px",background:`radial-gradient(circle at 50% 0%,${d.color}15,transparent 70%)`,opacity:0,transition:"opacity .3s"}}/>
        <div style={{fontSize:"2rem",marginBottom:".6rem"}}>{d.emoji}</div>
        <div style={{fontFamily:"'Syne',sans-serif",fontSize:"1.1rem",fontWeight:800,color:d.color,marginBottom:".35rem"}}>{d.label}</div>
        <p style={{fontSize:".78rem",color:"#7a7f95",lineHeight:1.5,marginBottom:".7rem"}}>{d.desc}</p>
        <div style={{fontSize:".75rem",color:d.color,fontWeight:600}}>5 Questions · +{d.xp} XP each →</div>
      </div>)}
    </div>
  </div>;
}

function Quiz({cat,diff,go,onBack,onXP}){
  const di=DIFF.find(d=>d.key===diff)||DIFF[0];
  const qs=(QUESTIONS[cat.id]||{})[diff]||[];
  const[idx,setIdx]=useState(0);
  const[sel,setSel]=useState(null);
  const[answered,setAnswered]=useState(false);
  const[score,setScore]=useState(0);
  const[done,setDone]=useState(false);
  if(!qs.length)return<div className="page" style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",textAlign:"center",padding:"2rem"}}><div><p style={{color:"#8b8fa8",marginBottom:"1rem"}}>Questions coming soon!</p><button className="btn-g" onClick={onBack}>Go Back</button></div></div>;
  const q=qs[idx];
  const pick=(i)=>{if(answered)return;setSel(i);setAnswered(true);if(i===q.ans)setScore(s=>s+1);};
  const earned=()=>score*di.xp;
  const next=()=>{if(idx+1>=qs.length){onXP(cat.id,earned());setDone(true);}else{setIdx(i=>i+1);setSel(null);setAnswered(false);}};
  if(done)return<div className="page" style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"2rem",textAlign:"center"}}>
    <div style={{fontSize:"4.5rem",marginBottom:"1rem",animation:"pulse 1.5s ease infinite"}}>{score===qs.length?"🏆":score>=qs.length/2?"⭐":"📚"}</div>
    <h2 style={{fontFamily:"'Syne',sans-serif",fontSize:"2rem",fontWeight:800,marginBottom:".5rem"}}>Quiz Complete!</h2>
    <div style={{display:"inline-flex",alignItems:"center",gap:".4rem",background:`${di.color}18`,border:`1px solid ${di.color}40`,borderRadius:"100px",padding:".3rem .9rem",marginBottom:"1rem",fontSize:".82rem",color:di.color,fontWeight:700}}>{di.emoji} {di.label}</div>
    <p style={{color:"#8b8fa8",marginBottom:".4rem"}}>You scored <span style={{color:cat.color,fontWeight:700}}>{score}/{qs.length}</span> on {cat.name}</p>
    <p style={{color:"#34d399",fontWeight:700,fontSize:"1.1rem",marginBottom:"2rem"}}>+{earned()} XP saved to your account!</p>
    <div style={{display:"flex",gap:"1rem",flexWrap:"wrap",justifyContent:"center"}}>
      <button className="btn-p" onClick={()=>{setIdx(0);setSel(null);setAnswered(false);setScore(0);setDone(false);}}>Try Again</button>
      <button className="btn-g" onClick={onBack}>Other Difficulty</button>
      <button className="btn-g" onClick={()=>go("dashboard")}>Dashboard</button>
    </div>
  </div>;
  return<div className="page" style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"5rem 1.5rem 2rem"}}>
    <div style={{width:"100%",maxWidth:"560px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:".78rem",color:"#8b8fa8",marginBottom:".4rem"}}>
        <span>{cat.icon} {cat.name} <span style={{color:di.color,fontWeight:700}}>{di.emoji} {di.label}</span></span>
        <span>{idx+1}/{qs.length}</span>
      </div>
      <div style={{height:"4px",background:"rgba(255,255,255,.08)",borderRadius:"100px",overflow:"hidden",marginBottom:"2rem"}}>
        <div style={{height:"100%",width:`${(idx/qs.length)*100}%`,background:di.color,borderRadius:"100px",transition:"width .5s"}}/>
      </div>
      <div style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",borderRadius:"18px",padding:"1.8rem",marginBottom:"1.4rem"}}>
        <h3 style={{fontFamily:"'Syne',sans-serif",fontSize:"1.15rem",fontWeight:700,lineHeight:1.45}}>{q.q}</h3>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:".75rem",marginBottom:"1.4rem"}}>
        {q.opts.map((opt,i)=>{
          let bg="rgba(255,255,255,.04)",border="1px solid rgba(255,255,255,.1)",color="#e8eaf0";
          if(answered){if(i===q.ans){bg=`${di.color}22`;border=`1px solid ${di.color}`;color=di.color;}else if(i===sel&&i!==q.ans){bg="rgba(248,113,113,.15)";border="1px solid #f87171";color="#f87171";}}
          return<button key={i} className="opt" disabled={answered} onClick={()=>pick(i)} style={{background:bg,border,color}}>
            <span style={{width:"24px",height:"24px",borderRadius:"50%",background:"rgba(255,255,255,.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:".72rem",fontWeight:700,flexShrink:0}}>{["A","B","C","D"][i]}</span>
            {opt}
          </button>;
        })}
      </div>
      {answered&&<div style={{animation:"fadeIn .4s ease"}}>
        <div style={{padding:"1rem",background:`${di.color}12`,border:`1px solid ${di.color}28`,borderRadius:"12px",fontSize:".84rem",color:"#c5c8d6",lineHeight:1.7,marginBottom:"1rem"}}>
          <span style={{color:di.color,fontWeight:700}}>💡 </span>{q.exp}
        </div>
        <button className="btn-p" style={{width:"100%",padding:".9rem",fontSize:".95rem"}} onClick={next}>{idx+1>=qs.length?"See Results →":"Next Question →"}</button>
      </div>}
    </div>
  </div>;
}

/* ── APP ── */
function App(){
  const[page,setPage]=useState("home");
  const[user,setUser]=useState(null);
  const[cat,setCat]=useState(null);
  const[progress,setProgress]=useState({});
  const[notif,setNotif]=useState(null);
  const[dbLoading,setDbLoading]=useState(false);

  useEffect(()=>{
    initStars();
    // Check if user already logged in
    sb.auth.getSession().then(({data:{session}})=>{
      if(session?.user){
        const u=session.user;
        setUser({id:u.id,name:u.user_metadata?.name||"Learner",email:u.email});
        loadProgress(u.id);
        setPage("dashboard");
      }
    });
    // Listen for auth changes
    const{data:{subscription}}=sb.auth.onAuthStateChange((_event,session)=>{
      if(!session)setUser(null);
    });
    return()=>subscription.unsubscribe();
  },[]);

  const loadProgress=async(userId)=>{
    setDbLoading(true);
    const{data,error}=await sb.from("progress").select("subject,xp").eq("user_id",userId);
    if(!error&&data){
      const p={};
      data.forEach(row=>{p[row.subject]=row.xp;});
      setProgress(p);
    }
    setDbLoading(false);
  };

  const saveProgress=async(userId,subject,xp)=>{
    await sb.from("progress").upsert({user_id:userId,subject,xp,updated_at:new Date().toISOString()},{onConflict:"user_id,subject"});
  };

  const go=(p)=>{window.scrollTo({top:0,behavior:"smooth"});setPage(p);};
  const showN=(m,c="#34d399")=>{setNotif({m,c});setTimeout(()=>setNotif(null),2800);};

  const handleAuth=(u)=>{
    setUser(u);
    loadProgress(u.id);
    go("dashboard");
  };

  const signOut=async()=>{
    await sb.auth.signOut();
    setUser(null);setProgress({});setCat(null);go("home");
    showN("Signed out successfully","#818cf8");
  };

  const onXP=async(catId,xp)=>{
    const newXP=(progress[catId]||0)+xp;
    setProgress(p=>({...p,[catId]:newXP}));
    showN(`+${xp} XP saved! 🎉`,"#34d399");
    if(user?.id) await saveProgress(user.id,catId,newXP);
  };

  const totalXP=Object.values(progress).reduce((a,b)=>a+b,0);

  return<>
    <Notif n={notif}/>
    <Nav user={user} go={go} signOut={signOut} xp={totalXP}/>
    {page==="home"&&<Home go={go}/>}
    {page==="auth"&&<Auth onAuth={handleAuth} showN={showN}/>}
    {page==="dashboard"&&user&&<Dashboard user={user} progress={progress} goStudy={c=>{setCat(c);go("study");}} loading={dbLoading}/>}
    {page==="study"&&user&&<Study cat={cat} go={go} onXP={onXP}/>}
  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
